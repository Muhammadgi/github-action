# ==============================================
# COMPLETE CI/CD PIPELINE (PYTHON PROJECT)
# Platform: GitHub Actions
# ==============================================

name: Python CI/CD Pipeline

on:
  push:
    workflow_dispatch: 

jobs:
  # ==============================================
  # 1. SETUP ENVIRONMENT
  # ==============================================
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # ==============================================
  # 2. LINTING & FORMAT CHECK
  # ==============================================
  lint:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          pip install flake8 black

      - name: Run Flake8
        run: flake8 .

      - name: Check Formatting
        run: black --check .

  # ==============================================
  # 3. TESTING
  # ==============================================
  test:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Test Dependencies
        run: pip install pytest pytest-cov

      - name: Run Tests
        run: pytest --cov=.

  # ==============================================
  # 4. BUILD PACKAGE
  # ==============================================
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: pip install build

      - name: Build Package
        run: python -m build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  # ==============================================
  # 5. SECURITY CHECK
  # ==============================================
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Safety Tool
        run: pip install safety

      - name: Run Security Scan
        run: safety check

  # ==============================================
  # 6. DEPLOY TO STAGING
  # ==============================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying Python app to staging..."
          # Example: SSH, Docker, or cloud deployment

  # ==============================================
  # 7. DEPLOY TO PRODUCTION
  # ==============================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package

      - name: Deploy to Production
        run: |
          echo "Deploying Python app to production..."
          # Add real deployment here (AWS, Docker, etc.)

  # ==============================================
  # 8. NOTIFICATIONS
  # ==============================================
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-production]

    steps:
      - name: Notify
        run: |
          echo "Python CI/CD pipeline completed successfully!"
