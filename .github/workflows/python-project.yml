name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  # ----------------------
  # BUILD STAGE
  # ----------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Linux Commands
        run: |
          echo "Build stage started..."
          ls -la
          pwd

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pytest

      - name: Build Step (Create App)
        run: |
          echo "def add(a, b): return a + b" > app.py
          echo "print('Build successful ✅')" >> app.py

  # ----------------------
  # TEST STAGE
  # ----------------------
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Test Dependencies
        run: |
          pip install pytest

      - name: Create Test File
        run: |
          echo "from app import add" > test_app.py
          echo "def test_add(): assert add(2, 3) == 5" >> test_app.py

      - name: Run Tests
        run: |
          pytest

  # ----------------------
  # DEPLOY STAGE
  # ----------------------
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulated Deployment
        run: |
          echo "Deploying application..."
          echo "Application deployed successfully 🚀"
