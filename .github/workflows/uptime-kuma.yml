name : uptime-kuma  

on:
  push:

    branches: [main]

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repository
        run: curl -o compose.yaml https://raw.githubusercontent.com/louislam/uptime-kuma/master/compose.yaml
      - name: lst the files in the current directory
        run: ls -la
  
    
    
   
      - name: Installation Of Docker Compose  
        run: sudo apt install docker-compose -y
      - name: Check Docker Compose Version
        run: docker-compose --version
      - name: Check Docker Version
        run: docker --version
      - name: lst the files in the current directory
        run: ls -la
      - name: Docker Compose Build
        run: sudo docker-compose up -d
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check Docker Running Container
        run: sudo docker ps -a
